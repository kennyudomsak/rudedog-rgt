<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#5C94FC">
<title>RUDEDOG FAIR 2026 — Game UI V2</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700;800&family=Noto+Sans+Thai:wght@400;500;600;700&family=Press+Start+2P&family=Space+Mono:wght@700&display=swap" rel="stylesheet">

<!-- Animation + Confetti (CDN) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/canvas-confetti/1.9.3/confetti.browser.min.js"></script>

<style>
/* ============================================================
   DESIGN TOKENS (RUDEDOG × Super-Mario world)
   ============================================================ */
:root{
  --ink:#17120E; --ink-soft:#4A4138;
  --paper:#F2E9D6; --paper-2:#FBF6EA;
  --red:#E23A1E; --red-deep:#B62A12;
  --gold:#E2A638; --ok:#2E7D52; --line:rgba(23,18,14,.16);
  --night:#101720; --night-2:#1c2732; --cream-edge:#f5e8cc;
  /* mario world */
  --sky:#5C94FC; --sky-2:#9CC0FF; --brick:#C8500C; --brick-d:#8A3608;
  --pipe:#2E9E32; --coin:#F7C73C; --shadow:rgba(23,18,14,.9);
  --r:14px;
  --ff:"Google Sans",system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans Thai",Arial,sans-serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{
  font-family:var(--ff);
  color:var(--ink);
  background:
    radial-gradient(circle at 16% 12%,rgba(255,255,255,.95) 0 18px,rgba(255,255,255,.62) 19px 32px,transparent 33px),
    radial-gradient(circle at 84% 18%,rgba(255,255,255,.88) 0 15px,rgba(255,255,255,.5) 16px 27px,transparent 28px),
    linear-gradient(180deg,#5C94FC 0%,#75B7FF 56%,#9CD7FF 100%);
  min-height:100dvh; display:flex; align-items:flex-start; justify-content:center; padding:0;
  overflow-x:hidden;
}
.px{font-family:"Press Start 2P","Space Mono",monospace;}
:focus-visible{outline:3px solid var(--gold);outline-offset:2px;border-radius:6px;}

/* canvases */
#world{position:fixed;inset:0;width:100%;height:100%;z-index:0;pointer-events:none;display:none;}
#fx{position:fixed;inset:0;width:100%;height:100%;z-index:5;pointer-events:none;display:block;}

/* ============================================================
   FRAME / PANEL  (cream UI panel sitting on the sky — blocky)
   ============================================================ */
#stage{width:100%;max-width:430px;position:relative;z-index:2;}
.ticket{
  background:linear-gradient(180deg,#5C94FC,#9CD7FF);
  border:0;border-radius:0;box-shadow:none;
  overflow:hidden; position:relative;
  min-height:100dvh;
}
#app{position:relative;}
.screen{
  width:100%;min-height:100dvh;position:relative;overflow:hidden;
  background:linear-gradient(180deg,#5C94FC 0%,#67B7FF 55%,#9FD9FF 100%);
}
.pad{padding:20px 18px 24px;}
.center{text-align:center;}

/* mute = chunky game button */
.mute{
  position:fixed; top:18px; right:calc(50% - 183px); z-index:60; width:44px; height:44px; border-radius:10px;
  border:3px solid var(--ink); background:var(--gold); color:var(--ink); font-size:20px; cursor:pointer;
  box-shadow:3px 3px 0 var(--shadow); display:flex; align-items:center; justify-content:center;
}
.mute:active{transform:translate(2px,2px);box-shadow:1px 1px 0 var(--shadow);}

/* ============================================================
   BUTTONS (blocky, press-down)
   ============================================================ */
.btn-cta{
  width:100%; background:linear-gradient(#f53d32,var(--red)); color:#fff; border:3px solid #070707;
  font-family:var(--ff); font-weight:900; font-size:21px; padding:17px 15px; border-radius:7px;
  box-shadow:0 6px 0 var(--red-deep), 0 9px 0 #090909; cursor:pointer;
  transition:transform .07s, box-shadow .07s; position:relative;
}
.btn-cta:active{transform:translateY(5px);box-shadow:0 1px 0 var(--red-deep),5px 4px 0 var(--shadow);}
.btn-cta[disabled]{opacity:.75;}
.back{margin-top:14px;background:none;border:none;color:inherit;font-family:inherit;font-size:14px;cursor:pointer;padding:6px;font-weight:800;opacity:.8;}

/* ============================================================
   WELCOME (title screen)
   ============================================================ */
.welcome{
  background:
    radial-gradient(circle at 16% 12%,#fff 0 16px,rgba(255,255,255,.72) 17px 26px,transparent 27px),
    radial-gradient(circle at 76% 13%,#fff 0 11px,rgba(255,255,255,.78) 12px 19px,transparent 20px),
    linear-gradient(#19a0ff 0 42%,#6cc6ff 42% 70%,#151b21 70% 100%);
}
.welcome::after,.contact::after{content:"";position:absolute;left:0;right:0;bottom:0;height:84px;background:repeating-linear-gradient(90deg,var(--brick) 0 38px,var(--brick-d) 39px 42px),repeating-linear-gradient(0deg,transparent 0 20px,rgba(0,0,0,.5) 21px 24px);border-top:4px solid #31200b;z-index:0;}
.welcome::before{content:"🐶";position:absolute;left:16px;bottom:72px;font-size:34px;z-index:1;filter:drop-shadow(2px 3px 0 rgba(0,0,0,.45));}
.topbar{background:transparent;color:#fff;padding:34px 24px 10px;display:flex;align-items:center;justify-content:center;gap:8px;text-align:center;}
.wordmark{font-family:"Press Start 2P","Space Mono",monospace;font-weight:900;font-size:29px;line-height:.92;letter-spacing:0;color:var(--red);text-shadow:3px 3px 0 #000,-2px -2px 0 #fff,2px -2px 0 #fff,-2px 2px 0 #fff;}
.wordmark .g{display:block;color:#fff;font-size:18px;margin-top:8px;text-shadow:3px 3px 0 #000;}
.tag{display:none;}
.evinfo{display:none;}
.eyebrow{display:block;text-align:center;font-size:13px;color:#1e1a12;margin:0 0 10px;letter-spacing:.2px;font-weight:900;}
.eyebrow .px{font-size:9px;}
.eyebrow .blink{animation:blink 1s steps(1) infinite;}
@keyframes blink{50%{opacity:0;}}
.h1{font-family:var(--ff);font-weight:900;font-size:34px;line-height:1.1;margin:0 0 8px;text-align:center;}
.h1 .red{color:var(--red);}
.sub{font-size:13.5px;color:var(--ink);line-height:1.35;margin:0 0 14px;font-weight:800;text-align:center;}
.prize{
  position:relative;overflow:hidden;display:flex;align-items:center;gap:14px;
  background:linear-gradient(135deg,#FFF3CF,var(--coin));
  border:4px solid var(--ink);border-radius:12px;padding:13px 15px;margin-bottom:16px;
  box-shadow:5px 5px 0 var(--shadow); animation:bobble 1.6s ease-in-out infinite;
}
.prize::after{content:"";position:absolute;inset:0;background:linear-gradient(115deg,transparent 35%,rgba(255,255,255,.65) 50%,transparent 65%);transform:translateX(-120%);animation:shimmer 2.8s infinite;}
@keyframes shimmer{0%{transform:translateX(-130%)}55%,100%{transform:translateX(130%)}}
@keyframes bobble{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
.prize-ic{font-size:38px;line-height:1;filter:drop-shadow(2px 2px 0 rgba(0,0,0,.25));}
.prize-k{display:block;font-size:8px;color:var(--ink);opacity:.7;margin-bottom:3px;}
.prize-tx b{font-family:var(--ff);font-weight:800;font-size:19px;color:var(--ink);}
.welcome .pad{position:relative;z-index:2;margin:0 18px 0;padding:6px 14px 132px;}
.welcome .h1,.welcome .deals{background:var(--paper);border:3px solid #8a5f23;box-shadow:0 5px 0 rgba(0,0,0,.58);}
.welcome .h1{border-radius:4px;padding:18px 12px;}
.chips{display:none;}
.chip{background:var(--ink);color:var(--paper);font-size:12.5px;font-weight:800;padding:7px 12px;border-radius:8px;border:2px solid var(--ink);box-shadow:2px 2px 0 var(--shadow);}
.fine{
  width:max-content;max-width:100%;font-size:15px;color:#fff;text-align:center;margin:12px auto 0;padding:3px 10px;
  line-height:1.5;font-weight:900;text-shadow:2px 2px 0 #000;background:rgba(7,12,18,.68);border:2px solid rgba(255,255,255,.16);
}

/* ============================================================
   QUIZ — HUD + question blocks
   ============================================================ */
.quiz{background:linear-gradient(180deg,#101720,#121922 70%,#0b1118);}
.quiz::after{content:"";position:absolute;left:0;right:0;bottom:0;height:64px;background:linear-gradient(#49a642 0 12px,#257425 12px 24px),repeating-linear-gradient(90deg,var(--brick) 0 38px,var(--brick-d) 39px 42px);border-top:3px solid #0b3614;z-index:0;}
.quiz .pad{position:relative;z-index:1;padding-bottom:42px;}
.hud{padding:20px 18px 0;position:relative;z-index:2;}
.hud-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;padding-right:46px;}  /* เว้นที่ให้ปุ่ม mute มุมขวา ไม่ทับ */
.coinhud{font-size:15px;color:#fff;background:#111;border:3px solid #000;padding:8px 10px;border-radius:7px;box-shadow:2px 2px 0 rgba(0,0,0,.8);}
.coinhud b{color:var(--coin);}
.world{font-size:10px;color:var(--ink);opacity:.65;}
.coins{display:flex;gap:6px;}
.coinp{width:17px;height:17px;border-radius:50%;border:3px solid var(--ink);background:#7a6743;box-shadow:1px 1px 0 var(--shadow);}
.coinp.on{background:radial-gradient(circle at 36% 30%,#fff,var(--coin) 46%,var(--gold));}
/* Mission progress bar (ชัดเจน — รู้ว่าใกล้จบ) */
.mission-ttl{font-weight:900;font-size:18px;color:var(--paper);line-height:1;}
.mission-ttl b{color:var(--red);font-size:21px;}
.mission-ttl span{color:rgba(255,255,255,.8);font-size:14px;font-weight:800;}
.mtrack{display:flex;align-items:center;gap:6px;margin-top:12px;}
.mcell{flex:1;height:19px;border:2px solid #eee;border-radius:3px;background:#1a1a1a;box-shadow:0 2px 0 #000;transition:background .25s;}
.mcell.done{background:linear-gradient(#ff7b53,var(--red));}
.mcell.cur{background:linear-gradient(#ff7b53,var(--red));animation:mpulse 1s ease-in-out infinite;}
@keyframes mpulse{0%,100%{transform:translateY(0);box-shadow:1px 2px 0 var(--shadow)}50%{transform:translateY(-3px);box-shadow:1px 5px 0 var(--shadow)}}
.mflag{font-size:28px;margin-left:4px;line-height:1;}
.provbtns{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}
.provbtn{font-family:var(--ff);font-size:15px;font-weight:600;color:var(--ink);background:var(--paper-2);border:3px solid var(--ink);border-radius:10px;padding:11px;cursor:pointer;box-shadow:3px 3px 0 var(--shadow);}
.provbtn:active{transform:translate(2px,2px);box-shadow:1px 1px 0 var(--shadow);}
.provbtn.sel{background:#fff;border-color:var(--red);color:var(--red);}
.mleft{margin-top:8px;text-align:center;font-size:14px;font-weight:800;color:rgba(255,255,255,.85);}
.mleft .hot{color:var(--red-deep);font-weight:800;font-size:15.5px;}
.meta{font-size:11px;font-weight:600;color:var(--red);margin-bottom:5px;letter-spacing:.5px;}
.meta .last{color:var(--red-deep);}
.q{font-family:var(--ff);font-weight:900;font-size:28px;line-height:1.16;margin:0 0 18px;text-align:center;}
.hint{font-size:13px;color:var(--ink-soft);line-height:1.45;margin:-7px 0 15px;font-weight:600;}
.opts{display:flex;flex-direction:column;gap:10px;}
.opt{
  position:relative;display:flex;align-items:center;gap:12px;width:100%;text-align:left;
  background:linear-gradient(#fff9ea,#f4e8cc);border:2px solid #61451d;border-radius:5px;padding:13px 13px;
  font-family:inherit;font-size:18px;color:var(--ink);cursor:pointer;
  box-shadow:0 3px 0 rgba(0,0,0,.6); transition:background .1s, border-color .1s;
}
.opt:active{transform:translate(2px,2px);box-shadow:2px 2px 0 var(--shadow);}
.opt-em{flex:none;width:38px;height:38px;display:grid;place-items:center;font-size:22px;
  background:#101010;color:#fff;border:0;border-radius:5px;line-height:1;}
.opt-lb{font-weight:800;line-height:1.2;}
.opt.sel{background:linear-gradient(#f83a34,var(--red));border-color:#2b0705;color:#fff;}
.opt.sel .opt-em{background:#111;color:#fff;}
.opt.sel .opt-lb,.opt.sel .opt-sub{
  color:#fff;text-shadow:0 2px 0 rgba(0,0,0,.28);
}
.opt.sel::after{
  content:"✦";position:absolute;right:-8px;top:-13px;font-size:24px;color:#ffe56b;
  text-shadow:2px 2px 0 #17120E;animation:stickerPop .55s steps(2,end) both;
}
/* grid / tile (Q2) */
.opts.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.opt.tile{flex-direction:column;text-align:center;gap:10px;padding:24px 12px;}
.opt.tile .opt-em{width:62px;height:62px;font-size:34px;}
.opt.tile .opt-lb{flex:none;font-family:var(--ff);font-weight:800;font-size:17px;}
.hl{color:var(--red);font-weight:800;}                                    /* เน้นแดง = แบรนด์/จุดสนใจ */
.save{color:var(--ok);font-weight:800;}                                   /* เน้นเขียว = ความคุ้ม/ประหยัด */
.opt-tx{flex:1;min-width:0;display:flex;flex-direction:column;gap:1px;}
.opt-sub{font-size:12px;color:var(--ink-soft);font-weight:600;line-height:1.3;}
.combo-lbl{font-weight:800;font-size:20px;margin:2px 0 11px;color:var(--ink);line-height:1.25;}
.combo-lbl.combo-2{margin-top:18px;}
.combo-lbl b{color:var(--red);font-size:22px;margin-right:6px;}
.pitch{display:none;}
.deals{border:2px solid #4b3316;border-radius:3px;padding:10px 11px;margin-bottom:14px;background:var(--paper);box-shadow:0 3px 0 rgba(0,0,0,.55);}
.deal{display:flex;gap:11px;align-items:flex-start;}
.deal+.deal{margin-top:10px;border-top:2px dashed rgba(23,18,14,.25);padding-top:10px;}
.deal-n{flex:none;width:28px;height:28px;border-radius:50%;background:var(--red);color:#fff;border:2px solid var(--ink);font-family:"Press Start 2P",monospace;font-size:11px;display:flex;align-items:center;justify-content:center;}
.deal b{font-family:var(--ff);font-weight:800;font-size:17px;display:block;color:var(--ink);line-height:1.28;}
.deal small{font-size:12px;color:var(--ink-soft);font-weight:700;}
.opts.pad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}      /* แป้นตัวเลข 1–6 (ข้อ 2) */
.opt.numkey{justify-content:center;padding:20px 0;}
.numk{font-weight:800;font-size:30px;color:var(--ink);line-height:1;}
.opt.numkey.sel .numk{color:#fff;text-shadow:0 3px 0 rgba(0,0,0,.36);}
.counter{margin-top:14px;text-align:center;font-size:13px;font-weight:600;color:var(--red-deep);min-height:20px;}
.counter b{font-family:"Space Mono";}
.counter.demo{color:var(--ink-soft);font-weight:500;font-size:12px;}

/* ============================================================
   CAPTURE
   ============================================================ */
.field{display:block;margin-bottom:13px;}
.lab{display:block;font-size:14px;font-weight:800;margin-bottom:7px;}
.lab em{color:var(--ink-soft);font-style:normal;font-weight:400;}
input[type=text],input[type=tel],select{
  width:100%;font-family:inherit;font-size:18px;padding:14px 13px;border:3px solid var(--ink);
  border-radius:10px;background:var(--paper-2);color:var(--ink);box-shadow:3px 3px 0 var(--shadow);
}
input:focus,select:focus{outline:none;border-color:var(--red);}
.phonewrap{display:flex;align-items:stretch;}
.pfx{display:flex;align-items:center;padding:0 12px;background:var(--ink);color:var(--paper);font-family:"Space Mono";font-weight:700;border:3px solid var(--ink);border-right:none;border-radius:10px 0 0 10px;box-shadow:3px 3px 0 var(--shadow);}
.phonewrap input{border-radius:0 10px 10px 0;font-family:"Space Mono";letter-spacing:1px;}
input.bad{border-color:var(--red)!important;background:#fff5f3;}
.err{color:var(--red);font-size:13px;min-height:18px;margin:-2px 0 10px;font-weight:600;line-height:1.4;}
.consent{display:flex;gap:10px;align-items:flex-start;font-size:12.5px;color:var(--ink-soft);line-height:1.45;margin-bottom:16px;cursor:pointer;font-weight:600;}
.consent input{margin-top:1px;width:20px;height:20px;flex:none;accent-color:var(--red);}
.trust{text-align:center;font-size:12px;color:var(--ink-soft);margin:10px 0 0;}

/* ============================================================
   SUCCESS — course clear
   ============================================================ */
.clear-banner{font-size:11px;color:var(--ok);margin-bottom:6px;letter-spacing:1px;}
.burst{font-size:58px;line-height:1;margin:2px 0;}
.won{font-family:var(--ff);font-weight:800;font-size:28px;line-height:1.18;margin:0 0 4px;}
.flagwrap{position:relative;height:0;}
.ticketbox{position:relative;background:var(--ink);color:var(--paper);border:4px solid #000;border-radius:12px;padding:16px;margin:16px 6px;box-shadow:5px 5px 0 var(--shadow);}
.ticketbox::before,.ticketbox::after{content:"";position:absolute;top:50%;width:18px;height:18px;background:var(--paper);border-radius:50%;transform:translateY(-50%);}
.ticketbox::before{left:-10px;}.ticketbox::after{right:-10px;}
.tk-k{display:block;font-size:11px;font-weight:600;letter-spacing:.3px;color:var(--coin);margin-bottom:9px;}
.tk-no{font-size:29px;color:var(--coin);display:flex;justify-content:center;align-items:center;gap:1px;}
.tk-no .rd{color:var(--paper);}
.reel-digit{display:inline-block;width:21px;text-align:center;}
.tk-prize{display:block;font-size:12px;color:rgba(242,233,214,.8);margin-top:9px;}
.echo{background:#fff;border:3px dashed var(--gold);border-radius:10px;padding:11px 13px;margin:0 6px 14px;font-size:13.5px;font-weight:600;color:var(--ink);line-height:1.45;}
.echo .e-k{display:block;font-size:11px;font-weight:700;color:var(--red-deep);margin-bottom:4px;letter-spacing:.3px;}
.btn-follow{width:100%;background:var(--ink);color:#fff;border:4px solid #000;font-family:var(--ff);font-weight:800;font-size:17px;padding:13px;border-radius:12px;box-shadow:0 5px 0 #000,4px 8px 0 var(--shadow);cursor:pointer;margin-bottom:10px;text-decoration:none;display:block;text-align:center;}
.btn-follow:active{transform:translateY(4px);box-shadow:0 1px 0 #000,4px 4px 0 var(--shadow);}
.cta5{font-size:12.5px;color:var(--red-deep);font-weight:600;margin:0 0 14px;text-align:center;}
.steps{text-align:left;margin:6px 4px 16px;display:flex;flex-direction:column;gap:10px;}
.step{display:flex;gap:11px;align-items:center;font-size:14.5px;line-height:1.3;font-weight:700;}
.st-n{flex:none;width:27px;height:27px;border-radius:7px;background:var(--red);color:#fff;border:3px solid var(--ink);font-family:var(--ff);font-weight:800;font-size:13px;display:flex;align-items:center;justify-content:center;}

/* ============================================================
   V2 MOCKUP FIDELITY OVERRIDES
   ============================================================ */
.quest-card{
  position:relative;
  background:linear-gradient(#fff0cb,#f2d295);
  border:3px solid #77531f;
  border-radius:4px;
  box-shadow:0 5px 0 rgba(0,0,0,.65);
  padding:24px 20px 20px;
  margin-top:10px;
}
.quest-card::after{
  content:"🐾";position:absolute;right:12px;bottom:8px;font-size:20px;opacity:.18;
  transform:rotate(-12deg);pointer-events:none;
}
.quiz .pad::before{
  content:none;
  display:none;
}
.quest-card .q{color:var(--ink);}
.contact{
  color:var(--ink);
  background:
    radial-gradient(circle at 15% 10%,#fff 0 14px,rgba(255,255,255,.72) 15px 24px,transparent 25px),
    radial-gradient(circle at 86% 11%,#fff 0 12px,rgba(255,255,255,.76) 13px 20px,transparent 21px),
    linear-gradient(#19a0ff 0 28%,#6cc6ff 28% 100%);
}
.contact::after{
  content:"";position:absolute;left:0;right:0;bottom:0;height:64px;
  background:linear-gradient(#49a642 0 12px,#257425 12px 24px),repeating-linear-gradient(90deg,var(--brick) 0 38px,var(--brick-d) 39px 42px);
  border-top:3px solid #0b3614;z-index:0;
}
.contact .hud{padding-top:82px;color:#fff;}
.contact .hud::before{
  content:"ภารกิจสำเร็จ!";
  position:absolute;left:30px;right:30px;top:18px;
  background:linear-gradient(#fa4237,#cc2019);
  color:#fff;border:3px solid #4e0905;border-radius:5px;
  padding:10px 8px;text-align:center;font-size:25px;font-weight:900;
  box-shadow:0 4px 0 rgba(0,0,0,.55);transform:rotate(-1deg);z-index:1;
}
.contact .mission-ttl,.contact .coinhud,.contact .mtrack,.contact .mleft{display:none;}
.contact .pad{
  position:relative;z-index:1;margin:0 18px 72px;padding:22px 20px 22px;
  background:linear-gradient(#fff2cf,#f4d69a);
  border:3px solid #79551f;border-radius:4px;
  box-shadow:0 5px 0 rgba(0,0,0,.58);
}
.contact .q{text-align:left;font-size:29px;}
.contact .pfx{background:#fff;color:var(--ink);border:2px solid #61451d;border-right:none;border-radius:5px 0 0 5px;box-shadow:0 2px 0 rgba(0,0,0,.45);}
.contact .phonewrap input{border-radius:0 5px 5px 0;box-shadow:0 2px 0 rgba(0,0,0,.45);border:2px solid #61451d;}

/* ============================================================
   AudioEngine (chiptune / 8-bit — Web Audio API)
   ============================================================ */
const Audio = (() => {
  let ctx, master, muted=false, voices=0, musicGain, mTimer=null, musicOn=false, wantMusic=false, mStep=0, mNext=0;
  function init(){ if(ctx) return; ctx=new (window.AudioContext||window.webkitAudioContext)();
    master=ctx.createGain(); master.gain.value=.25; master.connect(ctx.destination); }
  function resume(){ ctx && ctx.state==="suspended" && ctx.resume(); }
  const now=()=>ctx?ctx.currentTime:0;   // ปลอดภัยถ้ายังไม่ init (กัน throw เวลาเสียงถูกเรียกก่อน unlock)
  function note(freq,t0,dur,o={}){
    if(muted||!ctx||voices>18) return;
    const {type="square",peak=.5,slideTo=null}=o;
    const osc=ctx.createOscillator(), g=ctx.createGain();
    osc.type=type; osc.frequency.setValueAtTime(freq,t0);
    if(slideTo) osc.frequency.exponentialRampToValueAtTime(Math.max(1,slideTo),t0+dur);
    g.gain.setValueAtTime(.0001,t0);
    g.gain.exponentialRampToValueAtTime(peak,t0+.006);
    g.gain.exponentialRampToValueAtTime(.0001,t0+dur);
    osc.connect(g).connect(master);
    voices++; osc.onended=()=>voices--;
    osc.start(t0); osc.stop(t0+dur+.02);
  }
  function seq(arr,o={}){ let t=now(); arr.forEach(([f,d])=>{ if(f) note(f,t,d,o); t+=d; }); }

  function tap(){ note(660,now(),.05,{peak:.35}); }                          // menu blip
  function bump(){ note(180,now(),.09,{peak:.5,slideTo:90}); }               // block hit
  function coin(){ const t=now(); note(988,t,.07,{peak:.45}); note(1319,t+.06,.16,{peak:.45}); } // เหรียญ
  function score(){ coin(); }
  function jump(){ note(500,now(),.16,{peak:.4,slideTo:980}); }              // กระโดด (เปลี่ยนหน้า)
  function thunk(){ const t=now(); note(300,t,.14,{peak:.55,slideTo:120}); note(880,t,.03,{peak:.2}); }
  function error(){ const t=now(); note(420,t,.16,{peak:.42,slideTo:170}); note(196,t+.1,.2,{peak:.42,slideTo:90}); }
  function whoosh(){ jump(); }
  function powerUp(){ seq([[392,.05],[523,.05],[659,.05],[784,.05],[1047,.12]],{peak:.4}); }
  function reelTick(){ note(1245,now(),.02,{peak:.22}); }
  function ting(){ note(1568,now(),.25,{type:"triangle",peak:.4}); }
  function win(){                                                            // แฟนแฟร์เคลียร์ด่าน (mario-esque)
    if(muted||!ctx) return;
    const t=now(); const m=[[523,.12],[659,.12],[784,.12],[1047,.18],[784,.12],[1047,.34]];
    let tt=t; m.forEach(([f,d])=>{ note(f,tt,d+.05,{peak:.42}); note(f/2,tt,d+.05,{type:"triangle",peak:.2}); tt+=d; });
    for(let i=0;i<6;i++) note(1318+Math.random()*700,tt+i*.05,.12,{peak:.16});
  }
  function oneUp(){ seq([[660,.1],[880,.1],[1320,.1],[1056,.1],[1188,.1],[1584,.22]],{peak:.4}); }
  function key(){ note(1180,now(),.025,{type:"square",peak:.2}); }      // เสียงพิมพ์ (keypress)
  function coinBurst(){ if(!ctx)return; const t=now(); for(let i=0;i<10;i++){ const f=900+Math.random()*1100; note(f,t+i*.04,.12,{type:"square",peak:.34}); } }   // เหรียญระเบิด
  function cashReg(){ if(!ctx)return; const t=now();                     // คิดเงิน ka-ching
    note(1318.5,t,.12,{type:"triangle",peak:.5}); note(1760,t+.09,.3,{type:"triangle",peak:.5}); note(2637,t+.09,.18,{type:"sine",peak:.22});
    const dur=.08,buf=ctx.createBuffer(1,Math.floor(ctx.sampleRate*dur),ctx.sampleRate),d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*(1-i/d.length);
    const s=ctx.createBufferSource(); s.buffer=buf; const g=ctx.createGain(); g.gain.value=.14;
    const hp=ctx.createBiquadFilter(); hp.type="highpass"; hp.frequency.value=2200; s.connect(hp).connect(g).connect(master); s.start(t); s.stop(t+dur); }
  function cashIn(){ coinBurst(); cashReg(); }                          // คอมโบกระตุ้นตอนเข้าเกม

  /* --- background music: chiptune loop (32 steps, เบาๆ อยู่ใต้ SFX) --- */
  const MUSIC_VOL=0.32, MSTEP=0.42;            // ช้า + นุ่ม = รีแล็กซ์ ไม่กวนสมาธิอ่าน (ดังขึ้นตามที่บอสขอ)
  const _CH=[[261.63,329.63,392.00],[220.00,261.63,329.63],[174.61,220.00,261.63],[196.00,246.94,293.66]]; // C–Am–F–G (pad)
  const _MEL=[523.25,0,659.25,0, 587.33,0,0,440, 349.23,0,523.25,0, 392,0,440,0];   // เมโลดี้เบาบาง (music-box)
  function mvoice(freq,t,dur,type,peak,atk){ if(!ctx||!musicGain) return; atk=atk||.04;
    const o=ctx.createOscillator(),g=ctx.createGain(); o.type=type; o.frequency.setValueAtTime(freq,t);
    g.gain.setValueAtTime(.0001,t); g.gain.exponentialRampToValueAtTime(peak,t+atk); g.gain.exponentialRampToValueAtTime(.0001,t+dur);
    o.connect(g).connect(musicGain); o.start(t); o.stop(t+dur+.05); }
  function mStepPlay(i,t){ const m=_MEL[i]; if(m) mvoice(m,t,MSTEP*1.7,"triangle",.4,.02);                  // โน้ตนุ่ม
    if(i%4===0){ const ch=_CH[(i/4)%_CH.length]; ch.forEach(f=>mvoice(f,t,MSTEP*4.3,"sine",.13,.2)); } }     // pad คอร์ด swell ยาว
  function mSchedule(){ if(!musicOn||!ctx) return;
    while(mNext<ctx.currentTime+0.4){ mStepPlay(mStep,mNext); mNext+=MSTEP; mStep=(mStep+1)%_MEL.length; }
    mTimer=setTimeout(mSchedule,60); }
  function startMusic(){ if(!ctx) return; wantMusic=true; if(musicOn) return;
    if(!musicGain){ musicGain=ctx.createGain(); musicGain.connect(ctx.destination); }   // ต่อตรง ไม่ผ่าน master (กันเสียงเบาเกิน)
    musicGain.gain.value=muted?0:MUSIC_VOL; musicOn=true; mNext=ctx.currentTime+0.1; mSchedule(); }
  function stopMusic(){ musicOn=false; if(mTimer){ clearTimeout(mTimer); mTimer=null; } }

  return { init,resume,tap,bump,coin,score,jump,thunk,error,whoosh,powerUp,reelTick,ting,win,oneUp,key,coinBurst,cashReg,cashIn,startMusic,stopMusic,
           toggleMute(){ muted=!muted; if(musicGain) musicGain.gain.value=muted?0:MUSIC_VOL; if(muted) stopMusic(); else if(wantMusic) startMusic(); return muted; },
           get muted(){ return muted; } };
})();

let reduceMotion = mq.matches;

/* ============================================================
   FX — particle engine (ประกาย / ไฟ / ควัน / เหรียญ)
   ============================================================ */
const FX = (() => {
  const cvs=document.getElementById("fx"), ctx=cvs.getContext("2d");
  let dpr=1, parts=[], raf=null, cw=390, ch=700;
  function resize(){ dpr=Math.min(2,window.devicePixelRatio||1);
    cw=cvs.clientWidth||document.documentElement.clientWidth||innerWidth||390;
    ch=cvs.clientHeight||document.documentElement.clientHeight||innerHeight||700;
    cvs.width=Math.floor(cw*dpr); cvs.height=Math.floor(ch*dpr); ctx.setTransform(dpr,0,0,dpr,0,0); }
  function loop(){ raf=requestAnimationFrame(loop);
    ctx.clearRect(0,0,cw,ch);
    for(let i=parts.length-1;i>=0;i--){ const p=parts[i]; p.life-=1;
      if(p.life<=0){ parts.splice(i,1); continue; }
      p.vy+=p.g; p.x+=p.vx; p.y+=p.vy; p.vx*=p.fr; p.rot+=p.vr||0;
      const a=Math.max(0,p.life/p.max);
      ctx.globalAlpha=a*(p.a||1);
      if(p.kind==="spark"){ drawStar(p.x,p.y,p.s*a+1,p.c); }
      else if(p.kind==="coin"){ drawCoin(p.x,p.y,p.s,p.rot); }
      else if(p.kind==="smoke"){ ctx.fillStyle=p.c; ctx.beginPath(); ctx.arc(p.x,p.y,p.s*(1.6-a)+2,0,7); ctx.fill(); }
      else if(p.kind==="fire"){ ctx.fillStyle=p.c; ctx.beginPath(); ctx.arc(p.x,p.y,p.s*a+1,0,7); ctx.fill(); }
    }
    ctx.globalAlpha=1;
    if(!parts.length){ cancelAnimationFrame(raf); raf=null; }
  }
  function kick(){ if(!raf && !reduceMotion){ raf=requestAnimationFrame(loop); } }
  function drawStar(x,y,r,c){ ctx.fillStyle=c; ctx.save(); ctx.translate(x,y);
    ctx.beginPath(); for(let i=0;i<5;i++){ const a=(i*4*Math.PI)/5-Math.PI/2; ctx[i?"lineTo":"moveTo"](Math.cos(a)*r,Math.sin(a)*r);} ctx.closePath(); ctx.fill(); ctx.restore(); }
  function drawCoin(x,y,s,rot){ const w=Math.abs(Math.cos(rot))*s+1.5;
    ctx.fillStyle="#E2A638"; ctx.strokeStyle="#8a6312"; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.ellipse(x,y,w,s,0,0,7); ctx.fill(); ctx.stroke();
    ctx.fillStyle="#FFF0B0"; ctx.beginPath(); ctx.ellipse(x,y,w*.45,s*.55,0,0,7); ctx.fill(); }

  function add(p){ parts.push(p); kick(); }
  const GOLD=["#F7C73C","#FFE08A","#FFFFFF","#E2A638"];
  function sparkle(x,y,n=10){ if(reduceMotion)return; for(let i=0;i<n;i++){ const a=Math.random()*7,sp=1+Math.random()*4;
    add({kind:"spark",x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-1,g:.08,fr:.94,s:2+Math.random()*3,rot:0,c:GOLD[i%GOLD.length],life:26+Math.random()*16,max:42}); } }
  function coins(x,y,n=1){ if(reduceMotion)return; for(let i=0;i<n;i++){ add({kind:"coin",x:x+(Math.random()*20-10),y,vx:(Math.random()*2-1),vy:-6-Math.random()*3,g:.45,fr:1,s:9,rot:0,vr:.4,life:34,max:34}); } }
  function smoke(x,y,n=7){ if(reduceMotion)return; for(let i=0;i<n;i++){ add({kind:"smoke",x:x+(Math.random()*30-15),y:y+(Math.random()*8-4),vx:(Math.random()*2-1),vy:-.6-Math.random()*.8,g:-.01,fr:.97,s:5+Math.random()*6,rot:0,a:.5,c:"rgba(180,170,160,1)",life:30+Math.random()*14,max:44}); } }
  function fire(x,y,n=16){ if(reduceMotion)return; const cols=["#FFE66B","#FFB23E","#FF7A18","#E23A1E","#B62A12"];
    for(let i=0;i<n;i++){ add({kind:"fire",x:x+(Math.random()*24-12),y,vx:(Math.random()*2-1)*1.2,vy:-1.5-Math.random()*2.6,g:-.02,fr:.96,s:4+Math.random()*5,rot:0,c:cols[(Math.random()*cols.length)|0],life:20+Math.random()*16,max:36}); } }

  window.addEventListener("resize",resize);
  resize();
  return { sparkle, coins, smoke, fire };
})();

/* ============================================================
   WORLD — side-scrolling mario background (sky/clouds/hills/ground/coins)
   ============================================================ */
const World = (() => {
  const cvs=document.getElementById("world"), ctx=cvs.getContext("2d");
  let W,H,dpr=1,raf=null,last=0,boost=0;
  let clouds=[],coins=[],blocks=[],hillOff=0,groundOff=0,runner=null;
  function resize(){ dpr=Math.min(2,window.devicePixelRatio||1);
    W=cvs.clientWidth||document.documentElement.clientWidth||innerWidth||390;
    H=cvs.clientHeight||document.documentElement.clientHeight||innerHeight||700;
    cvs.width=Math.floor(W*dpr); cvs.height=Math.floor(H*dpr); ctx.setTransform(dpr,0,0,dpr,0,0); build();
  }
  function build(){
    clouds=[]; for(let i=0;i<3;i++) clouds.push({x:Math.random()*W, y:40+Math.random()*Math.min(160,H*.3), s:.7+Math.random()*.7});
    coins=[]; for(let i=0;i<5;i++) coins.push({x:Math.random()*W, y:H*.45+Math.random()*H*.2, ph:Math.random()*7});
    blocks=[]; for(let i=0;i<2;i++) blocks.push({x:Math.random()*W, y:H*.35+Math.random()*60});
    runner={x:W*0.35,dir:1,bob:0};
  }
  function drawRunner(sp,dt){ if(!runner) return; const gy=H-GH(), SZ=Math.max(66,Math.min(98,W*0.15));
    runner.x+=runner.dir*(1.7+sp*0.15);
    if(runner.x>W-SZ*0.55){ runner.x=W-SZ*0.55; runner.dir=-1; FX.smoke(runner.x,gy,6); }
    if(runner.x<SZ*0.55){ runner.x=SZ*0.55; runner.dir=1; FX.smoke(runner.x,gy,6); }
    runner.bob+=0.28*dt; const hop=Math.abs(Math.sin(runner.bob))*18;
    ctx.save(); ctx.globalAlpha=Math.max(.05,.16-hop*0.005); ctx.fillStyle="#000";
    ctx.beginPath(); ctx.ellipse(runner.x,gy+4,SZ*0.32,SZ*0.09,0,0,7); ctx.fill(); ctx.restore();   // เงาบนพื้น
    ctx.font=SZ+"px sans-serif"; ctx.textAlign="center"; ctx.textBaseline="bottom"; ctx.fillText("🐶",runner.x,gy+4-hop); }
  const GH=()=>Math.max(40,Math.min(72,H*.10));   // ground height
  function bgFill(){ const g=ctx.createLinearGradient(0,0,0,H); g.addColorStop(0,"#5C94FC"); g.addColorStop(1,"#9CC0FF"); ctx.fillStyle=g; ctx.fillRect(0,0,W,H); }
  function cloud(x,y,s){ ctx.fillStyle="rgba(255,255,255,.92)";
    [[0,0,26],[22,4,20],[-22,4,20],[0,10,28]].forEach(([dx,dy,r])=>{ ctx.beginPath(); ctx.arc(x+dx*s,y+dy*s,r*s,0,7); ctx.fill(); }); }
  function coinSprite(x,y){ ctx.fillStyle="#E2A638"; ctx.strokeStyle="#8a6312"; ctx.lineWidth=2;
    ctx.beginPath(); ctx.ellipse(x,y,7,10,0,0,7); ctx.fill(); ctx.stroke();
    ctx.fillStyle="#FFF0B0"; ctx.beginPath(); ctx.ellipse(x,y,3,5,0,0,7); ctx.fill(); }
  function qblock(x,y){ const s=26; ctx.fillStyle="#E2A638"; ctx.strokeStyle="#17120E"; ctx.lineWidth=3;
    ctx.fillRect(x,y,s,s); ctx.strokeRect(x,y,s,s);
    ctx.fillStyle="#17120E"; ctx.fillRect(x+7,y+7,12,12); ctx.textAlign="left"; ctx.textBaseline="alphabetic"; }
  function hills(off){ const base=H-GH(); ctx.fillStyle="#3aa83f";
    const span=260; for(let x=-(off%span)-span; x<W+span; x+=span){ ctx.beginPath(); ctx.arc(x+span/2,base+10,110,Math.PI,0); ctx.fill(); } }
  function ground(off){ const gh=GH(), y=H-gh; ctx.fillStyle="#C8500C"; ctx.fillRect(0,y,W,gh);
    ctx.fillStyle="#7a8d2a"; ctx.fillRect(0,y,W,6);                       // grass top
    ctx.strokeStyle="rgba(0,0,0,.28)"; ctx.lineWidth=2; const bw=34,bh=18;
    for(let r=0;r<Math.ceil(gh/bh);r++){ const oy=y+8+r*bh; const stagger=(r%2)?bw/2:0;
      for(let x=-(off%bw)-bw+stagger; x<W+bw; x+=bw){ ctx.strokeRect(x,oy,bw,bh); } } }
  function frame(t){ raf=requestAnimationFrame(frame); const dt=Math.min(2.5,(t-last)/16.67)||1; last=t;
    const sp=(1.1+boost)*dt; boost*=0.92;
    bgFill();
    // sun
    ctx.fillStyle="rgba(255,247,210,.85)"; ctx.beginPath(); ctx.arc(W-50,60,34,0,7); ctx.fill();
    clouds.forEach(c=>{ c.x-=sp*.35*c.s; if(c.x<-90) c.x=W+60; cloud(c.x,c.y,c.s); });
    hillOff+=sp*.7; hills(hillOff);
    blocks.forEach(b=>{ b.x-=sp*1.0; if(b.x<-40) b.x=W+40; qblock(b.x,b.y); });
    coins.forEach(c=>{ c.x-=sp*1.0; c.ph+=.08*dt; if(c.x<-20) c.x=W+20; coinSprite(c.x,c.y+Math.sin(c.ph)*7); });
    groundOff+=sp*1.4; ground(groundOff);
    drawRunner(sp,dt);
  }
  function drawStatic(){ bgFill(); ctx.fillStyle="rgba(255,247,210,.85)"; ctx.beginPath(); ctx.arc(W-50,60,34,0,7); ctx.fill();
    clouds.forEach(c=>cloud(c.x,c.y,c.s)); hills(0); coins.forEach(c=>coinSprite(c.x,c.y)); ground(0);
    if(runner){ const gy=H-GH(), SZ=Math.max(66,Math.min(98,W*0.15)); ctx.font=SZ+"px sans-serif"; ctx.textAlign="center"; ctx.textBaseline="bottom"; ctx.fillText("🐶",runner.x,gy+4); } }
  function loop(){ if(raf) return; last=performance.now(); raf=requestAnimationFrame(frame); }
  function stop(){ if(raf){ cancelAnimationFrame(raf); raf=null; } }
  window.addEventListener("resize",()=>{ resize(); if(reduceMotion) drawStatic(); });
  document.addEventListener("visibilitychange",()=>{ document.hidden?stop():(reduceMotion?drawStatic():loop()); });
  return { start(){ resize(); reduceMotion?drawStatic():loop(); }, warp(){ if(!reduceMotion) boost=Math.min(7,boost+5); } };
})();

function transitionTo(buildFn){

  if(!M.on){ outgoing.remove(); current=incoming; afterMount(incoming); return; }
  const h0=app.offsetHeight; app.style.height=h0+"px";
  incoming.style.position="absolute"; incoming.style.top="0"; incoming.style.left="0"; incoming.style.width="100%";
  Audio.whoosh(); World.warp();
  const c=rectCenter(app); FX.smoke(c.x, c.r.bottom-10, 9);                 // ควันตอนเปลี่ยนหน้า
  afterMount(incoming);
  gsap.set(incoming,{xPercent:10,opacity:0});
  gsap.to(outgoing,{xPercent:-10,opacity:0,duration:.2,ease:"power2.in"});
  gsap.to(incoming,{xPercent:0,opacity:1,duration:.32,delay:.1,ease:"back.out(1.3)",onComplete:()=>{
    outgoing.remove(); incoming.style.position=""; incoming.style.top=""; incoming.style.left=""; incoming.style.width="";
    const target=incoming.offsetHeight; gsap.fromTo(app,{height:h0},{height:target,duration:.28,ease:"power2.out",onComplete:()=>{ app.style.height=""; }});
    current=incoming;
  }});
}
function afterMount(node){
  const f=node.querySelector("[data-focus]"); if(f) f.focus({preventScroll:true});
  if(state.screen==="welcome") entranceWelcome(node);
  else if(state.screen==="quiz") entranceQuiz(node);
  else if(state.screen==="contact") entranceContact(node);
  else if(state.screen==="success") entranceSuccess(node);
  // SAFETY: รับประกันทุก element มองเห็นเสมอ แม้ GSAP ticker ถูก throttle (in-app browser TikTok/FB)
  setTimeout(()=>{ if(current!==node||!window.gsap) return;
    gsap.set([node,...node.querySelectorAll(".prize,.btn-cta,.btn-follow,.opt,.field,.consent,.burst,.echo,.mcell,.mflag")],{opacity:1,clearProps:"transform"}); },1100);
}

function buildQuiz(){

               :remaining===2?'<span class="hot">อีก 2 ข้อ จบแล้ว! 💪</span>'

      return `<button class="opt numkey" data-grp="group" data-v="${val}"><span class="numk">${val}</span></button>`;}).join("")+`</div>`;

/* ============================================================
   SLOT-REEL (≤~1.2s + แตะข้ามได้)
   ============================================================ */
function spinReel(node,finalStr,onDone){
  const els=[...node.querySelectorAll(".reel-digit")], digits=[...finalStr];
  if(!M.on){ els.forEach((e,i)=>e.textContent=digits[i]); onDone&&onDone(); return; }
  let done=false; const ivs=[]; const ticker=setInterval(()=>Audio.reelTick(),60);
  function finish(){ if(done) return; done=true; clearInterval(ticker); ivs.forEach(clearInterval);
    els.forEach((e,i)=>e.textContent=digits[i]); document.removeEventListener("pointerdown",finish); onDone&&onDone(); }
  let stopped=0;
  els.forEach((el,i)=>{ let n=0; const max=8+i*4;     // last digit ~ (8+16)*45 ≈ 1080ms
    const iv=setInterval(()=>{ el.textContent=Math.floor(Math.random()*10);
      if(++n>=max){ clearInterval(iv); el.textContent=digits[i];
        gsap.fromTo(el,{y:-6,scale:1.3},{y:0,scale:1,duration:.2,ease:"back.out(2)"});
        if(++stopped===els.length) finish(); } },45); ivs.push(iv); });
  document.addEventListener("pointerdown",finish,{once:true});  // แตะข้ามได้ (กันคิวหน้าประตูติด)
  setTimeout(finish,1600);                                      // safety
}

async function submitLead(btn){
  if(state.sending) return; state.sending=true; btn.disabled=true; btn.textContent="กำลังส่ง…";
  Audio.thunk(); vibrate(14);
  // TODO(production): ให้ backend ออกเลข running จริงกันชนกัน — front-end สุ่มเป็น placeholder
  state.ticket="RD26-"+String(Math.floor(Math.random()*100000)).padStart(5,"0");
  const payload={ ticket:state.ticket, name:state.name, phone:state.phone.replace(/\D/g,""), province:state.province,
    score:state.score, consent:state.consent, answers:state.answers, event:CONFIG.eventName,
    utm:{source:UTM.utm_source||"",medium:UTM.utm_medium||"",campaign:UTM.utm_campaign||""}, ts:new Date().toISOString() };
  let dup=false;
  try{
    if(CONFIG.endpoint){
      const res=await fetch(CONFIG.endpoint,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify(payload)});
      let data=null; try{ data=await res.json(); }catch(_){}
      if(data && data.dup) dup=true;                      // เบอร์นี้ลงไปแล้ววันนี้ (backend เช็คให้)
    }else{ console.log("%c[DEMO MODE] payload ที่จะส่ง:","color:#E2A638;font-weight:bold",payload); await new Promise(r=>setTimeout(r,450)); }
  }catch(e){ console.warn("POST ล้มเหลว — เก็บ payload ไว้กู้:",JSON.stringify(payload)); }  // network fail → ปล่อยผ่าน
  state.sending=false;
  if(dup){
    btn.disabled=false; btn.textContent="รับรหัสสิทธิ์";
    const err=document.getElementById("phoneErr"); if(err) err.textContent="เบอร์นี้ลงทะเบียนไปแล้ววันนี้ — 1 เบอร์ลุ้นได้ 1 สิทธิ์/วันนะ 🎟️";
    Audio.error(); const pw=document.querySelector(".phonewrap"); if(pw) shake(pw); return;
  }
  trackComplete(); go("success");
}

<!--
============================================================
GOOGLE APPS SCRIPT (ฝั่งรับ) — สำหรับบอสเคน
============================================================
1. Google Sheet ใหม่ → สร้างชีตชื่อ "leads"
2. หัวคอลัมน์แถวแรก:
   timestamp | ticket | name | phone | province | score | consent | source | visit | group | style | interest | forwho
3. Extensions → Apps Script → วางโค้ด → Deploy → New deployment → Web app
   → Execute as: Me · Who has access: Anyone → Deploy
4. ก็อป URL มาใส่ CONFIG.endpoint (และ URL เดียวกันใส่ CONFIG.countEndpoint สำหรับตัวนับสด)

function doPost(e){
  const sh = SpreadsheetApp.getActiveSpreadsheet().getSheetByName("leads");
  const d = JSON.parse(e.postData.contents);
  const phone = (""+d.phone).replace(/\D/g,"");
  const tz = "Asia/Bangkok", today = Utilities.formatDate(new Date(), tz, "yyyy-MM-dd");
  // กฎ: 1 เบอร์ ลงทะเบียนได้ 1 ครั้ง/วัน → ถ้าซ้ำคืน {dup:true}
  const rows = sh.getDataRange().getValues();
  for (let i=1;i<rows.length;i++){
    const rp = (""+rows[i][3]).replace(/\D/g,"");
    const rd = rows[i][0] instanceof Date ? Utilities.formatDate(rows[i][0], tz, "yyyy-MM-dd") : "";
    if (rp===phone && rd===today)
      return ContentService.createTextOutput(JSON.stringify({ok:false,dup:true})).setMimeType(ContentService.MimeType.JSON);
  }
  sh.appendRow([new Date(), d.ticket, d.name, "'"+phone, d.province, d.score, d.consent,
    d.answers.source, d.answers.visit, d.answers.group, d.answers.style, d.answers.interest, d.answers.forwho]);
  return ContentService.createTextOutput(JSON.stringify({ok:true})).setMimeType(ContentService.MimeType.JSON);
}
function doGet(){ // ตัวนับสด — จำนวนแถวจริง (ห้ามปลอม)
  const sh = SpreadsheetApp.getActiveSpreadsheet().getSheetByName("leads");
  return ContentService.createTextOutput(JSON.stringify({count: sh.getLastRow()-1})).setMimeType(ContentService.MimeType.JSON);
}
